name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build application
        run: pnpm build
        env:
          NODE_ENV: production
          APP_URL: ${{ secrets.APP_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      
      - name: Debug - Find all build outputs
        run: |
          echo "=== Current directory contents ==="
          ls -la
          
          echo "=== Apps directory (if exists) ==="
          if [ -d "apps" ]; then
            ls -la apps/
            if [ -d "apps/web" ]; then
              echo "=== apps/web contents ==="
              ls -la apps/web/
            fi
          fi
          
          echo "=== Packages directory (if exists) ==="
          if [ -d "packages" ]; then
            ls -la packages/
          fi
          
          echo "=== Any dist/build/output directories ==="
          find . -type d \( -name "dist" -o -name "build" -o -name ".output" -o -name "out" \) 2>/dev/null | head -20
          
          echo "=== Build script from package.json ==="
          grep -A2 '"build"' package.json
          
          echo "=== Turbo repo build output (if using turbo) ==="
          if [ -d "node_modules/.cache/turbo" ]; then
            ls -la node_modules/.cache/turbo/
          fi
      
      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          
          # Try ALL possible build output locations
          if [ -d "apps/web/dist" ]; then
            echo "Found apps/web/dist"
            cp -r apps/web/dist/* deploy/ 2>/dev/null || cp -r apps/web/dist deploy/
          elif [ -d "apps/web/.next" ]; then
            echo "Found apps/web/.next (Next.js build)"
            cp -r apps/web/.next deploy/
          elif [ -d ".output" ]; then
            echo "Found .output"
            cp -r .output/* deploy/
          elif [ -d "dist" ]; then
            echo "Found dist"
            cp -r dist/* deploy/
          elif [ -d "build" ]; then
            echo "Found build"
            cp -r build/* deploy/
          else
            echo "WARNING: No standard build output found!"
            echo "Searching for any files modified in last minute..."
            find . -type f -mmin -5 | head -20
            exit 1
          fi
          
          echo "Deployment package contents:"
          ls -la deploy/
      
      - name: Create directory on cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          script: mkdir -p /home/qptvogx6pfzq/reactive-resume
      
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: deploy/
          server-dir: /reactive-resume/